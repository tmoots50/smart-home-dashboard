<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="540" height="960" preserveAspectRatio="xMidYMid meet">
  <title>Morning view — recommendation, 2026-04-29</title>
  <desc>Single-screen portrait morning view for the Smart Home Dashboard. Companion to _audits/2026-04-29-ui-audit.md. Demoted from this view: headlines, verse-of-the-day, photo card, chores list — those move to evening / auto-rotated views.</desc>

  <!-- ============ DESIGN TOKENS (mirroring ui-audit recommendations) ============ -->
  <!--
    Background:    #0E0E0F  (near-black, not pure)
    Card:          #16161A  (elevated surface)
    Card border:   #1F1F24  (very subtle, optional)
    Text primary:  #F4EDE5  (warm off-white)
    Text secondary:#9C958B  (mid gray, ≥4.5:1 on bg)
    Text label:    #6F6A63  (small-caps section labels)
    Accent:        #C9A66B  (muted gold — used sparingly)
    Accent dim:    #7A95B0  (cool slate — wet/diaper marker)
    Hairline:      #2A2A30
  -->

  <!-- background -->
  <rect width="1080" height="1920" fill="#0E0E0F"/>

  <!-- ============ TOP CHROME (date + temporal anchor + clock + weather) ============ -->
  <!-- Compressed to a single horizontal strip; clock is now ~36px not 200px. -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Arial, sans-serif">
    <text x="72" y="110" fill="#9C958B" font-size="22" letter-spacing="3">WED · APR 29</text>
    <text x="72" y="146" fill="#6F6A63" font-size="20" letter-spacing="2">DAY 24 OF PATERNITY LEAVE</text>
    <text x="1008" y="110" fill="#F4EDE5" font-size="34" font-weight="500" text-anchor="end">7:14 AM</text>
    <text x="1008" y="146" fill="#9C958B" font-size="22" text-anchor="end">58° · partly cloudy</text>
  </g>
  <line x1="72" y1="190" x2="1008" y2="190" stroke="#1F1F24" stroke-width="1"/>

  <!-- ============ HERO — NEXT EVENT (dominant; replaces clock as visual lead) ============ -->
  <g transform="translate(72, 230)">
    <rect width="936" height="450" rx="24" fill="#16161A"/>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif">
      <text x="48" y="60" fill="#6F6A63" font-size="22" letter-spacing="3">NEXT · IN 1H 16M</text>
    </g>
    <g font-family="Georgia, 'Times New Roman', Times, serif" fill="#F4EDE5">
      <text x="48" y="180" font-size="92" font-weight="400">8:30 AM</text>
      <text x="48" y="270" font-size="48">Pediatrician — Mabel 1mo</text>
    </g>
    <text x="48" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#9C958B" font-size="26">Park Slope Pediatrics · 5th Ave &amp; 9th St</text>
    <!-- Departure cue, the only accent-colored line in the hero. Earns the gold. -->
    <line x1="48" y1="365" x2="200" y2="365" stroke="#C9A66B" stroke-width="2"/>
    <text x="48" y="408" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#C9A66B" font-size="28" font-weight="500" letter-spacing="0.5">Leave by 8:00 AM</text>
  </g>

  <!-- ============ MABEL STATUS (timeline + headline) ============ -->
  <g transform="translate(72, 720)">
    <rect width="936" height="290" rx="24" fill="#16161A"/>
    <text x="48" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="22" letter-spacing="3">MABEL · 4W</text>
    <text x="888" y="60" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#9C958B" font-size="22" letter-spacing="2">6 FEEDS · 8 WETS · 2 DIRTIES · 12H</text>

    <!-- Headline: time since last feed, in display serif so it reads as a lead, not data -->
    <text x="48" y="170" font-family="Georgia, 'Times New Roman', Times, serif" fill="#F4EDE5" font-size="68" font-weight="400">3h 12m</text>
    <text x="48" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#9C958B" font-size="24">since last feed</text>

    <!-- Timeline (Tufte-style — preserve from current build, it's the gem). NOW marker pulses live. -->
    <g transform="translate(48, 252)">
      <line x1="0" y1="0" x2="840" y2="0" stroke="#2A2A30" stroke-width="2"/>
      <!-- feed (gold) and wet/diaper (slate) dots, last 12h -->
      <circle cx="20"  cy="0" r="6" fill="#C9A66B"/>
      <circle cx="50"  cy="0" r="6" fill="#7A95B0"/>
      <circle cx="180" cy="0" r="6" fill="#C9A66B"/>
      <circle cx="205" cy="0" r="6" fill="#7A95B0"/>
      <circle cx="230" cy="0" r="6" fill="#C9A66B"/>
      <circle cx="370" cy="0" r="6" fill="#C9A66B"/>
      <circle cx="395" cy="0" r="6" fill="#7A95B0"/>
      <circle cx="520" cy="0" r="6" fill="#C9A66B"/>
      <circle cx="545" cy="0" r="6" fill="#7A95B0"/>
      <circle cx="680" cy="0" r="6" fill="#C9A66B"/>
      <circle cx="705" cy="0" r="6" fill="#7A95B0"/>
      <circle cx="720" cy="0" r="6" fill="#C9A66B"/>
      <!-- NOW marker — visually distinct, signals "alive" -->
      <circle cx="830" cy="0" r="11" fill="#0E0E0F" stroke="#F4EDE5" stroke-width="2.5"/>
      <circle cx="830" cy="0" r="5" fill="#F4EDE5"/>
      <!-- axis labels -->
      <text x="0"   y="32" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="16" letter-spacing="1.5">−12H</text>
      <text x="420" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="16" letter-spacing="1.5">−6H</text>
      <text x="830" y="32" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="16" letter-spacing="1.5">NOW</text>
    </g>
  </g>

  <!-- ============ ROW: TODAY (left) + LEAVING THE HOUSE (right) ============ -->
  <!-- Today — collapsed to top 3 events (rest are post-fold, but you only get 3 in morning view) -->
  <g transform="translate(72, 1050)">
    <rect width="450" height="350" rx="24" fill="#16161A"/>
    <text x="48" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="22" letter-spacing="3">TODAY</text>
    <!-- Times use tabular numerals (font-feature-settings would do this in HTML; here we monospace by alignment). -->
    <g font-family="Georgia, 'Times New Roman', Times, serif" font-size="28" fill="#F4EDE5">
      <text x="48"  y="135" fill="#9C958B">8:30</text>
      <text x="160" y="135">Pediatrician</text>
      <text x="48"  y="205" fill="#9C958B">11:00</text>
      <text x="160" y="205">Coffee w/ Sara</text>
      <text x="48"  y="275" fill="#9C958B">2:15</text>
      <text x="160" y="275">Job-search standup</text>
    </g>
    <text x="48" y="325" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="18" letter-spacing="2">+1 LATER · DINNER 6:30</text>
  </g>

  <!-- Leaving the house — touch targets are 60×60 (rubric: kiosk-display floor) -->
  <g transform="translate(558, 1050)">
    <rect width="450" height="350" rx="24" fill="#16161A"/>
    <text x="48" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="22" letter-spacing="3">LEAVING THE HOUSE</text>
    <!-- Each row has a 60×60 tap area; the tap area extends across the full row width. -->
    <!-- Row 1 -->
    <rect x="36" y="100" width="378" height="60" rx="8" fill="transparent"/>
    <rect x="48" y="110" width="40" height="40" rx="6" stroke="#3A3A40" stroke-width="2.5" fill="transparent"/>
    <text x="116" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="26" fill="#F4EDE5">Diaper bag</text>
    <!-- Row 2 -->
    <rect x="36" y="180" width="378" height="60" rx="8" fill="transparent"/>
    <rect x="48" y="190" width="40" height="40" rx="6" stroke="#3A3A40" stroke-width="2.5" fill="transparent"/>
    <text x="116" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="26" fill="#F4EDE5">Pediatrician forms</text>
    <!-- Row 3 -->
    <rect x="36" y="260" width="378" height="60" rx="8" fill="transparent"/>
    <rect x="48" y="270" width="40" height="40" rx="6" stroke="#3A3A40" stroke-width="2.5" fill="transparent"/>
    <text x="116" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="26" fill="#F4EDE5">Spare onesie</text>
  </g>

  <!-- ============ DAILY NOTE (smaller, dated, italic serif) ============ -->
  <g transform="translate(72, 1440)">
    <rect width="936" height="270" rx="24" fill="#16161A"/>
    <text x="48" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#6F6A63" font-size="22" letter-spacing="3">FROM TIM · THIS MORNING</text>
    <text x="48" y="160" font-family="Georgia, 'Times New Roman', Times, serif" font-style="italic" fill="#F4EDE5" font-size="36">"You don't need to be cheerful</text>
    <text x="48" y="210" font-family="Georgia, 'Times New Roman', Times, serif" font-style="italic" fill="#F4EDE5" font-size="36"> — you just need to show up."</text>
  </g>

  <!-- ============ FOOT — minimal, ambient ============ -->
  <text x="540" y="1820" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" fill="#3A3A40" font-size="18" letter-spacing="4">MORNING VIEW · NEXT REFRESH 8:00 AM</text>

  <!-- ============ ANNOTATIONS (visible in source only — strip these for production) ============ -->
  <!--
    Composition rationale (against the 10-axis rubric):

    1. Layout & hierarchy
       Hero (next event) is ~2× the size of any other element. Clock demoted to chrome strip.
       Top-left = highest-priority temporal anchor (date + day-of-leave). Per Few.

    2. Typography
       Single display family (Georgia stand-in for Tiempos/Domaine).
       Italic serif reserved for ONE element (the daily note quote) — emphasis restored.
       Numerals in TODAY are aligned with explicit columns (no tabular-num CSS in SVG, but the
       layout demonstrates the intent).

    3. Color & contrast
       Single accent (#C9A66B muted gold) used twice: hero "Leave by 8:00 AM" and Mabel
       feed-marker dots. Cool slate (#7A95B0) only for wet/diaper markers. Everything else
       grayscale on near-black ground. Day/night palette swap not shown — assume sunset
       trigger drops brightness ~40% and warms color temp.

    4. Spacing
       Outer gutter 72px (matches Refactoring UI scale: 72 ≈ 4.5 × 16).
       Card radii 24px. Internal card padding 48px. Card-to-card gap 40px.

    5. Touch
       Checkbox glyphs are 40×40 inside 60×60 tap targets (the surrounding row rect).
       Row tap area spans full card width minus padding. Above kiosk floor.

    6. Information design
       "DAY 24 OF PATERNITY LEAVE" replaces the opaque "Halfway through."
       "FROM TIM · THIS MORNING" timestamps the note (DinkyDash daily-heartbeat pattern).
       TODAY shows top 3 + "+1 LATER" hint, not all 4 — fold pressure forces ranking.

    7. Identity
       Names omitted from the morning view (preserved in the rest of the build).
       Mabel age-in-weeks present. Tim's byline-on-note present. Neighborhood location
       in the hero subtitle.

    8. Distance readability
       Hero numerals at 92px, secondary at 48–34, body at 26–28, labels at 22.
       All above the rubric's 4ft / 6ft thresholds.

    9. Ambient hygiene
       NOW dot on the Mabel timeline is the live-data "heartbeat" element.
       Clock and section labels do change positions per view (morning/evening) so no
       single pixel position is high-contrast for 12+ hours.

    10. Wife test
       No admin-panel chrome. No Bootstrap remnants. No emoji icons. No version numbers.
       Editorial voice. Frame-TV ground.

    Demoted from this view (live in evening / auto-rotated):
      - Headlines (no doom at 7 AM)
      - Verse of the day
      - Mabel · week four photo card (becomes background or evening hero)
      - Chores (consolidated under Today, or evening view)
      - 3-day weather forecast (today's high/low only in morning chrome)
  -->
</svg>
